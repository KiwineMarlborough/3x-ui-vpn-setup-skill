# CDN fallback vhost — copy to /etc/nginx/sites-available/cdn-fallback
# Replace __CDN_DOMAIN__ before deploy. Certs: /etc/nginx/ssl/cdn/

server {
    listen 80;
    listen [::]:80;
    server_name __CDN_DOMAIN__;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name __CDN_DOMAIN__;

    ssl_certificate     /etc/nginx/ssl/cdn/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/cdn/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    root /var/www/cdn-fallback;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
}

# Optional alt TLS on 10443 (some setups probe non-443 HTTPS)
server {
    listen 10443 ssl http2;
    listen [::]:10443 ssl http2;
    server_name __CDN_DOMAIN__;

    ssl_certificate     /etc/nginx/ssl/cdn/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/cdn/privkey.pem;

    root /var/www/cdn-fallback;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}